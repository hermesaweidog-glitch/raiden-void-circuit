name: Security scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan tracked files for secrets
        run: python3 scripts/secret-scan.py
      - name: Check whitespace errors
        run: git diff --check
