<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>雷電 Raiden - HTML 版</title>
    <style>
        :root {
            --green: #39ff88;
            --cyan: #48e8ff;
            --amber: #ffd166;
            --red: #ff4d6d;
            --panel: rgba(4, 14, 18, 0.82);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at 50% 10%, rgba(48, 255, 160, 0.14), transparent 30%),
                linear-gradient(180deg, #04060c 0%, #071018 55%, #020308 100%);
            color: var(--green);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .cabinet {
            width: min(96vw, 680px);
            display: grid;
            gap: 8px;
            justify-items: center;
        }

        .title {
            width: min(96vw, 600px);
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border: 1px solid rgba(57, 255, 136, 0.35);
            background: var(--panel);
            box-shadow: 0 0 18px rgba(57, 255, 136, 0.14);
        }

        h1 {
            margin: 0;
            font-size: clamp(18px, 4vw, 30px);
            letter-spacing: 0.12em;
            text-shadow: 0 0 12px rgba(57, 255, 136, 0.9);
        }

        .subtitle {
            color: rgba(72, 232, 255, 0.88);
            font-size: clamp(10px, 2vw, 13px);
            text-align: right;
            line-height: 1.35;
        }

        .hud {
            width: min(96vw, 600px);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            font-size: clamp(10px, 2vw, 14px);
        }

        .hud > div {
            padding: 7px 8px;
            border: 1px solid rgba(57, 255, 136, 0.28);
            background: rgba(0, 10, 13, 0.78);
            text-align: center;
            box-shadow: inset 0 0 14px rgba(57, 255, 136, 0.08);
        }

        .hud b { color: white; font-weight: 800; }
        .hud .danger b { color: var(--red); }
        .hud .cyan b { color: var(--cyan); }
        .hud .amber b { color: var(--amber); }

        .screen-wrap {
            position: relative;
            width: min(96vw, 600px);
            aspect-ratio: 3 / 4;
            border: 3px solid rgba(57, 255, 136, 0.75);
            border-radius: 8px;
            background: #000;
            box-shadow:
                0 0 24px rgba(57, 255, 136, 0.22),
                0 0 70px rgba(72, 232, 255, 0.10),
                inset 0 0 20px rgba(57, 255, 136, 0.12);
            overflow: hidden;
        }

        .screen-wrap::after {
            content: "";
            pointer-events: none;
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(180deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 4px),
                radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.30));
            mix-blend-mode: screen;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #01040a;
            image-rendering: pixelated;
            touch-action: none;
            cursor: crosshair;
        }

        .controls {
            width: min(96vw, 600px);
            color: rgba(214, 255, 226, 0.82);
            border: 1px solid rgba(72, 232, 255, 0.22);
            background: rgba(1, 8, 12, 0.78);
            padding: 9px 10px;
            font-size: clamp(10px, 2vw, 13px);
            line-height: 1.6;
            text-align: center;
        }

        .green { color: var(--green); }
        .cyan { color: var(--cyan); }
        .amber { color: var(--amber); }
        .red { color: var(--red); }

        @media (max-height: 850px) {
            body { align-items: start; overflow-y: auto; }
            .screen-wrap { width: min(74vh, 96vw, 600px); }
            .title, .hud, .controls { width: min(74vh, 96vw, 600px); }
        }
    </style>
</head>
<body>
    <main class="cabinet">
        <section class="title" aria-label="title">
            <h1>RAIDEN</h1>
            <div class="subtitle">RAIDEN-INSPIRED HTML EDITION<br />SLOWER ARCADE PACE</div>
        </section>

        <section class="hud" aria-label="game status">
            <div>SCORE<br /><b id="score">000000</b></div>
            <div>BEST<br /><b id="best">000000</b></div>
            <div class="danger">LIVES<br /><b id="lives">★★★</b></div>
            <div class="cyan">WEAPON<br /><b id="power">V1</b></div>
            <div class="amber">BOMB<br /><b id="bombs">★★</b></div>
        </section>

        <div class="screen-wrap">
            <canvas id="game" width="600" height="800" aria-label="Raiden style shooting game"></canvas>
        </div>

        <section class="controls">
            <span class="green">移動</span>：方向鍵 / WASD / 滑鼠拖曳　
            <span class="cyan">射擊</span>：SPACE / 滑鼠長按　
            <span class="amber">炸彈</span>：X / B / SHIFT　
            <span class="red">暫停</span>：P　靜音：M<br />
            收集 <span class="red">V</span>/<span class="cyan">L</span>/<span class="amber">H</span> 切換/升級武器，收集 <span class="amber">B</span> 補炸彈；玩家中央小亮點才是判定核心。
        </section>
    </main>

    <script>
        (() => {
            'use strict';

            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d', { alpha: false });
            const W = canvas.width;
            const H = canvas.height;
            const TAU = Math.PI * 2;
            const rand = (min, max) => min + Math.random() * (max - min);
            const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
            const dist2 = (a, b) => {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return dx * dx + dy * dy;
            };
            const WEAPONS = {
                vulcan: { code: 'V', label: 'VULCAN', color: '#ff4d6d', glow: '#ffd166' },
                laser: { code: 'L', label: 'LASER', color: '#48e8ff', glow: '#b8fff6' },
                homing: { code: 'H', label: 'HOMING', color: '#ffd166', glow: '#c084fc' }
            };
            const weaponKeys = Object.keys(WEAPONS);
            const weaponCode = () => (WEAPONS[state.weapon]?.code || 'V') + state.power;

            const el = {
                score: document.getElementById('score'),
                best: document.getElementById('best'),
                lives: document.getElementById('lives'),
                power: document.getElementById('power'),
                bombs: document.getElementById('bombs')
            };

            const state = {
                mode: 'start',
                frame: 0,
                score: 0,
                best: Number(localStorage.getItem('raiden-html-best') || 0),
                lives: 3,
                bombs: 2,
                power: 1,
                weapon: 'vulcan',
                difficulty: 1,
                waveCooldown: 60,
                nextBossFrame: 2300,
                combo: 0,
                comboTimer: 0,
                shake: 0,
                flash: 0,
                hitstop: 0,
                muted: localStorage.getItem('raiden-html-muted') === '1'
            };

            let player;
            let audioCtx = null;
            let loopStarted = false;
            let lastTs = 0;
            const keys = Object.create(null);
            const pointer = { down: false, x: W / 2, y: H - 110 };

            let bullets = [];
            let enemyBullets = [];
            let enemies = [];
            let particles = [];
            let powerups = [];
            let floatTexts = [];
            let shockwaves = [];

            const stars = Array.from({ length: 110 }, (_, i) => ({
                x: (i * 53 + 17) % W,
                y: (i * 97 + 31) % H,
                z: 0.25 + (i % 5) * 0.22,
                twinkle: Math.random() * TAU
            }));

            function makePlayer() {
                return {
                    x: W / 2,
                    y: H - 82,
                    r: 9,
                    hitR: 4.5,
                    speed: 5.0,
                    fireCooldown: 0,
                    invincible: 0,
                    flash: 0,
                    muzzle: 0,
                    trail: []
                };
            }

            function resetGame() {
                state.mode = 'playing';
                state.frame = 0;
                state.score = 0;
                state.lives = 3;
                state.bombs = 2;
                state.power = 1;
                state.weapon = 'vulcan';
                state.difficulty = 1;
                state.waveCooldown = 150;
                state.nextBossFrame = 2300;
                state.combo = 0;
                state.comboTimer = 0;
                state.shake = 0;
                state.flash = 0;
                state.hitstop = 0;

                player = makePlayer();
                player.invincible = 120;
                bullets = [];
                enemyBullets = [];
                enemies = [];
                particles = [];
                powerups = [];
                floatTexts = [];
                shockwaves = [];

                addText(W / 2, H / 2, 'MISSION START', '#39ff88', 58, 0, -0.35, 22);
                spawnWave('opening');
                updateHud();
            }

            function updateHud() {
                el.score.textContent = String(state.score).padStart(6, '0');
                el.best.textContent = String(state.best).padStart(6, '0');
                el.lives.textContent = '★'.repeat(state.lives) + '☆'.repeat(Math.max(0, 3 - state.lives));
                el.power.textContent = weaponCode();
                el.bombs.textContent = '★'.repeat(state.bombs) + '☆'.repeat(Math.max(0, 3 - state.bombs));
            }

            function initAudio() {
                if (!audioCtx) {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    if (Ctx) audioCtx = new Ctx();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSound(type) {
                if (state.muted || !audioCtx) return;
                const presets = {
                    shoot: [[960, 0.045, 'square', 0.030], [1220, 0.035, 'sawtooth', 0.018]],
                    enemyShoot: [[360, 0.060, 'triangle', 0.030]],
                    boom: [[90, 0.34, 'sawtooth', 0.15], [44, 0.46, 'square', 0.10]],
                    hit: [[220, 0.08, 'triangle', 0.045]],
                    power: [[880, 0.08, 'sine', 0.050], [1320, 0.12, 'sine', 0.045]],
                    bomb: [[70, 0.60, 'sawtooth', 0.17], [180, 0.34, 'square', 0.07]],
                    start: [[520, 0.10, 'sine', 0.06], [820, 0.12, 'sine', 0.05], [1240, 0.15, 'sine', 0.04]]
                };
                const notes = presets[type] || presets.hit;
                const baseTime = audioCtx.currentTime;
                notes.forEach(([freq, dur, wave, gainValue], i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const filter = audioCtx.createBiquadFilter();
                    osc.type = wave;
                    osc.frequency.setValueAtTime(freq, baseTime + i * 0.025);
                    if (type === 'boom' || type === 'bomb') {
                        osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq * 0.35), baseTime + dur + i * 0.025);
                    }
                    filter.type = 'lowpass';
                    filter.frequency.value = type === 'shoot' ? 2600 : 1300;
                    gain.gain.setValueAtTime(gainValue, baseTime + i * 0.025);
                    gain.gain.exponentialRampToValueAtTime(0.0001, baseTime + dur + i * 0.025);
                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(baseTime + i * 0.025);
                    osc.stop(baseTime + dur + i * 0.025 + 0.02);
                });
            }

            function screenToCanvas(evt) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: (evt.clientX - rect.left) * W / rect.width,
                    y: (evt.clientY - rect.top) * H / rect.height
                };
            }

            function keyDown(evt) {
                keys[evt.code] = true;
                if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(evt.code)) {
                    evt.preventDefault();
                }
                initAudio();

                if ((evt.code === 'Space' || evt.code === 'Enter') && (state.mode === 'start' || state.mode === 'gameover')) {
                    playSound('start');
                    resetGame();
                    return;
                }

                if (evt.code === 'Space' && state.mode === 'playing') {
                    shoot();
                }

                if (evt.code === 'KeyP') {
                    if (state.mode === 'playing') state.mode = 'paused';
                    else if (state.mode === 'paused') state.mode = 'playing';
                }

                if (evt.code === 'KeyM') {
                    state.muted = !state.muted;
                    localStorage.setItem('raiden-html-muted', state.muted ? '1' : '0');
                    addText(W / 2, 120, state.muted ? 'MUTED' : 'SOUND ON', state.muted ? '#ff4d6d' : '#39ff88', 46, 0, -0.4, 18);
                }

                if (evt.code === 'KeyR') resetGame();
                if (['KeyX', 'KeyB', 'ShiftLeft', 'ShiftRight'].includes(evt.code)) useBomb();
            }

            function keyUp(evt) {
                keys[evt.code] = false;
            }

            function pointerDown(evt) {
                evt.preventDefault();
                initAudio();
                const p = screenToCanvas(evt);
                pointer.down = true;
                pointer.x = p.x;
                pointer.y = p.y;
                if (state.mode === 'start' || state.mode === 'gameover') {
                    playSound('start');
                    resetGame();
                } else if (state.mode === 'playing') {
                    shoot();
                }
            }

            function pointerMove(evt) {
                const p = screenToCanvas(evt);
                pointer.x = p.x;
                pointer.y = p.y;
            }

            function pointerUp() {
                pointer.down = false;
            }

            document.addEventListener('keydown', keyDown, { passive: false });
            document.addEventListener('keyup', keyUp);
            canvas.addEventListener('pointerdown', pointerDown, { passive: false });
            canvas.addEventListener('pointermove', pointerMove);
            window.addEventListener('pointerup', pointerUp);
            window.addEventListener('blur', () => { Object.keys(keys).forEach(k => keys[k] = false); pointer.down = false; });

            function addBullet(x, y, vx, vy, options = {}) {
                bullets.push({
                    x, y, vx, vy,
                    r: options.r || 4,
                    damage: options.damage || 1,
                    color: options.color || '#61ff8d',
                    glow: options.glow || options.color || '#61ff8d',
                    pierce: options.pierce || 0,
                    life: options.life || 110,
                    kind: options.kind || 'bolt',
                    homing: !!options.homing,
                    turn: options.turn || 0.05
                });
            }

            function addEnemyBullet(x, y, vx, vy, r = 5, color = '#ffd166') {
                enemyBullets.push({ x, y, vx, vy, r, color, life: 300 });
            }

            function nearestEnemy(x, y) {
                let best = null;
                let bestD = Infinity;
                enemies.forEach(e => {
                    const d = (e.x - x) ** 2 + (e.y - y) ** 2;
                    if (d < bestD) { best = e; bestD = d; }
                });
                return best;
            }

            function shoot() {
                if (!player || state.mode !== 'playing' || player.fireCooldown > 0) return;
                const p = state.power;
                const x = player.x;
                const y = player.y - 20;
                player.muzzle = 5;
                playSound('shoot');

                if (state.weapon === 'laser') {
                    player.fireCooldown = Math.max(6, 15 - p * 1.2);
                    const width = 3 + p * 0.55;
                    addBullet(x, y - 4, 0, -12.6, { r: width, damage: 1.55 + p * 0.18, color: '#b8fff6', glow: '#48e8ff', pierce: 2 + Math.floor(p / 2), kind: 'laser', life: 95 });
                    if (p >= 3) {
                        addBullet(x - 10, y + 4, 0, -11.6, { r: 2.3, damage: 0.8, color: '#48e8ff', glow: '#48e8ff', pierce: 1, kind: 'laser', life: 90 });
                        addBullet(x + 10, y + 4, 0, -11.6, { r: 2.3, damage: 0.8, color: '#48e8ff', glow: '#48e8ff', pierce: 1, kind: 'laser', life: 90 });
                    }
                    return;
                }

                if (state.weapon === 'homing') {
                    player.fireCooldown = Math.max(9, 18 - p * 1.4);
                    addBullet(x, y, 0, -10.4, { r: 3.8, damage: 1.0, color: '#ffffff', glow: '#c084fc', kind: 'bolt' });
                    addBullet(x - 16, y + 9, -1.1, -8.7, { r: 4.8, damage: 1.15, color: '#ffd166', glow: '#c084fc', kind: 'missile', homing: true, turn: 0.055 });
                    addBullet(x + 16, y + 9, 1.1, -8.7, { r: 4.8, damage: 1.15, color: '#ffd166', glow: '#c084fc', kind: 'missile', homing: true, turn: 0.055 });
                    if (p >= 3) {
                        addBullet(x - 28, y + 16, -1.7, -8.0, { r: 4.3, damage: 0.95, color: '#ffb703', glow: '#c084fc', kind: 'missile', homing: true, turn: 0.045 });
                        addBullet(x + 28, y + 16, 1.7, -8.0, { r: 4.3, damage: 0.95, color: '#ffb703', glow: '#c084fc', kind: 'missile', homing: true, turn: 0.045 });
                    }
                    if (p >= 5) addBullet(x, y + 16, 0, -9.2, { r: 5.0, damage: 1.25, color: '#ffd166', glow: '#ffffff', kind: 'missile', homing: true, turn: 0.07 });
                    return;
                }

                // Red Vulcan: Raiden-style wide forward spread, slower and readable.
                player.fireCooldown = Math.max(6, 13 - p * 1.15);
                const high = p >= 4;
                addBullet(x, y, 0, -11.5, { r: high ? 4.8 : 4, damage: high ? 1.25 : 1, color: '#ff4d6d', glow: '#ffd166', pierce: p >= 5 ? 1 : 0 });
                if (p >= 2) {
                    addBullet(x - 13, y + 7, -0.45, -10.8, { r: 3.8, damage: 0.95, color: '#ff6b6b', glow: '#ffd166' });
                    addBullet(x + 13, y + 7, 0.45, -10.8, { r: 3.8, damage: 0.95, color: '#ff6b6b', glow: '#ffd166' });
                }
                if (p >= 3) {
                    addBullet(x - 22, y + 10, -1.65, -9.7, { r: 3.5, damage: 0.85, color: '#ffd166', glow: '#ff4d6d' });
                    addBullet(x + 22, y + 10, 1.65, -9.7, { r: 3.5, damage: 0.85, color: '#ffd166', glow: '#ff4d6d' });
                }
                if (p >= 5) {
                    addBullet(x - 32, y + 14, -2.6, -8.5, { r: 3.2, damage: 0.75, color: '#ffffff', glow: '#ffd166' });
                    addBullet(x + 32, y + 14, 2.6, -8.5, { r: 3.2, damage: 0.75, color: '#ffffff', glow: '#ffd166' });
                }
            }

            function useBomb() {
                if (state.mode !== 'playing' || state.bombs <= 0) return;
                state.bombs--;
                state.shake = Math.max(state.shake, 24);
                state.flash = Math.max(state.flash, 0.75);
                state.hitstop = Math.max(state.hitstop, 6);
                playSound('bomb');
                addShockwave(player.x, player.y, '#ffd166', 90);
                burst(player.x, player.y, 70, ['#ffd166', '#ff8c42', '#ffffff'], 7.5);
                enemyBullets = [];
                enemies.forEach(e => {
                    e.hp -= e.type === 'boss' ? 14 : 99;
                    burst(e.x, e.y, e.type === 'boss' ? 14 : 22, ['#ffd166', '#ff4d6d', '#48e8ff'], 5);
                    if (e.hp <= 0) destroyEnemy(e, true);
                });
                enemies = enemies.filter(e => e.hp > 0);
                addText(W / 2, H / 2, 'BOMB!', '#ffd166', 48, 0, -0.7, 34);
                updateHud();
            }

            function spawnEnemy(type, x, y, options = {}) {
                const defs = {
                    grunt:  { r: 15, hp: 1.4, vy: 1.15, score: 160, color: '#ff4d6d', pattern: 'sine', shoot: 0 },
                    dart:   { r: 10, hp: 1.0, vy: 2.05, score: 130, color: '#ff7a7a', pattern: 'zig', shoot: 0 },
                    turret: { r: 17, hp: 3.2, vy: 0.78, score: 300, color: '#a855f7', pattern: 'straight', shoot: 105 },
                    tank:   { r: 23, hp: 6.2, vy: 0.62, score: 520, color: '#ff9f1c', pattern: 'slow', shoot: 95 },
                    boss:   { r: 46, hp: 55, vy: 0.30, score: 3200, color: '#ef476f', pattern: 'boss', shoot: 72 }
                };
                const base = defs[type] || defs.grunt;

                enemies.push({
                    type,
                    x,
                    y,
                    vx: options.vx || 0,
                    vy: options.vy ?? base.vy,
                    r: base.r,
                    hp: options.hp || base.hp,
                    maxHp: options.hp || base.hp,
                    score: base.score,
                    color: base.color,
                    pattern: options.pattern || base.pattern,
                    shootCooldown: options.shootCooldown || base.shoot || 0,
                    seed: Math.random() * 999,
                    t: 0,
                    flash: 0
                });
            }

            function spawnWave(kind = null) {
                const f = state.frame;
                const d = state.difficulty;
                if (!kind) {
                    if (f > state.nextBossFrame && !enemies.some(e => e.type === 'boss')) kind = 'boss';
                    else {
                        const roll = Math.random();
                        kind = roll < 0.30 ? 'line' : roll < 0.56 ? 'vee' : roll < 0.74 ? 'mixed' : roll < 0.90 ? 'turrets' : 'tanks';
                    }
                }

                if (kind === 'opening') {
                    for (let i = 0; i < 3; i++) spawnEnemy('grunt', 150 + i * 150, -70 - i * 58, { pattern: 'straight', vy: 1.05 });
                    return;
                }

                if (kind === 'boss') {
                    state.nextBossFrame += 2600;
                    state.shake = Math.max(state.shake, 8);
                    addText(W / 2, 165, 'WARNING', '#ff4d6d', 90, 0, -0.15, 28);
                    spawnEnemy('boss', W / 2, -80, { hp: 48 + d * 8 });
                    return;
                }

                if (kind === 'line') {
                    const count = 4 + Math.floor(Math.min(2, d));
                    const gap = W / (count + 1);
                    for (let i = 0; i < count; i++) {
                        spawnEnemy('grunt', gap * (i + 1), -30 - i * 10, { pattern: i % 2 ? 'sine' : 'straight' });
                    }
                }

                if (kind === 'vee') {
                    for (let i = -3; i <= 3; i++) {
                        spawnEnemy('dart', W / 2 + i * 45, -35 - Math.abs(i) * 28, { vx: i * 0.10, pattern: 'zig' });
                    }
                }

                if (kind === 'mixed') {
                    for (let i = 0; i < 4; i++) spawnEnemy('grunt', rand(55, W - 55), -35 - i * 58, { pattern: 'sine' });
                    spawnEnemy('turret', rand(80, W - 80), -190, { shootCooldown: 80 });
                }

                if (kind === 'turrets') {
                    spawnEnemy('turret', rand(70, W / 2 - 40), -60, { shootCooldown: 85 });
                    spawnEnemy('turret', rand(W / 2 + 40, W - 70), -140, { shootCooldown: 125 });
                    if (d > 1.8) spawnEnemy('dart', rand(50, W - 50), -190, { pattern: 'zig' });
                }

                if (kind === 'tanks') {
                    spawnEnemy('tank', rand(70, W - 70), -80, { shootCooldown: 95 });
                    for (let i = 0; i < 3; i++) spawnEnemy('dart', rand(50, W - 50), -160 - i * 48, { pattern: 'straight' });
                }
            }

            function aimBullet(x, y, speed, spread = 0, r = 5, color = '#ffd166') {
                const angle = Math.atan2(player.y - y, player.x - x) + spread;
                addEnemyBullet(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, r, color);
            }

            function updatePlayer() {
                let dx = 0;
                let dy = 0;
                if (keys.ArrowLeft || keys.KeyA) dx--;
                if (keys.ArrowRight || keys.KeyD) dx++;
                if (keys.ArrowUp || keys.KeyW) dy--;
                if (keys.ArrowDown || keys.KeyS) dy++;

                if (dx || dy) {
                    const len = Math.hypot(dx, dy) || 1;
                    player.x += dx / len * player.speed;
                    player.y += dy / len * player.speed;
                }

                if (pointer.down) {
                    player.x += (pointer.x - player.x) * 0.22;
                    player.y += (clamp(pointer.y, H * 0.50, H - 42) - player.y) * 0.10;
                }

                player.x = clamp(player.x, 24, W - 24);
                player.y = clamp(player.y, H * 0.48, H - 36);
                player.trail.unshift({ x: player.x, y: player.y + 16, life: 16 });
                if (player.trail.length > 12) player.trail.pop();
                player.trail.forEach(t => t.life--);
                player.trail = player.trail.filter(t => t.life > 0);

                player.fireCooldown = Math.max(0, player.fireCooldown - 1);
                player.invincible = Math.max(0, player.invincible - 1);
                player.flash = Math.max(0, player.flash - 1);
                player.muzzle = Math.max(0, player.muzzle - 1);

                if (pointer.down || keys.Space) shoot();
            }

            function updateBullets() {
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    if (b.homing && enemies.length) {
                        const target = nearestEnemy(b.x, b.y);
                        if (target) {
                            const angle = Math.atan2(target.y - b.y, target.x - b.x);
                            const speed = Math.max(7.2, Math.hypot(b.vx, b.vy));
                            b.vx += (Math.cos(angle) * speed - b.vx) * b.turn;
                            b.vy += (Math.sin(angle) * speed - b.vy) * b.turn;
                        }
                    }
                    b.x += b.vx;
                    b.y += b.vy;
                    b.life--;
                    if (b.life <= 0 || b.x < -50 || b.x > W + 50 || b.y < -60 || b.y > H + 60) bullets.splice(i, 1);
                }

                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const b = enemyBullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.life--;
                    if (b.life <= 0 || b.x < -35 || b.x > W + 35 || b.y < -45 || b.y > H + 45) {
                        enemyBullets.splice(i, 1);
                        continue;
                    }
                    if (player.invincible <= 0 && dist2(b, player) < (b.r + player.hitR) ** 2) {
                        enemyBullets.splice(i, 1);
                        playerHit();
                        break;
                    }
                }
            }

            function updateEnemies() {
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    e.t++;
                    e.flash = Math.max(0, e.flash - 1);

                    if (e.pattern === 'sine') e.x += Math.sin((e.t + e.seed) / 30) * (0.65 + state.difficulty * 0.12);
                    if (e.pattern === 'zig') e.x += Math.sin((e.t + e.seed) / 14) * 1.45 + e.vx;
                    if (e.pattern === 'boss') {
                        if (e.y < 95) e.y += e.vy;
                        e.x += Math.sin(e.t / 52) * 1.55;
                    } else {
                        e.y += e.vy * (0.86 + state.difficulty * 0.045);
                        e.x += e.vx || 0;
                    }
                    e.x = clamp(e.x, e.r + 4, W - e.r - 4);

                    if (e.shootCooldown > 0 && e.y > 10 && e.y < H * 0.78) {
                        e.shootCooldown--;
                        if (e.shootCooldown <= 0) {
                            if (e.type === 'boss') {
                                for (let s = -2; s <= 2; s++) aimBullet(e.x, e.y + 20, 2.05 + state.difficulty * 0.12, s * 0.20, 5, '#ff4d6d');
                                if (e.t % 3 === 0) aimBullet(e.x - 28, e.y + 14, 2.55, -0.1, 4, '#ffd166');
                                e.shootCooldown = Math.max(54, 92 - state.difficulty * 7);
                            } else if (e.type === 'tank') {
                                aimBullet(e.x - 10, e.y + 12, 2.15 + state.difficulty * 0.13, -0.12, 5, '#ffd166');
                                aimBullet(e.x + 10, e.y + 12, 2.15 + state.difficulty * 0.13, 0.12, 5, '#ffd166');
                                e.shootCooldown = Math.max(72, 118 - state.difficulty * 9);
                            } else {
                                aimBullet(e.x, e.y + 8, 2.35 + state.difficulty * 0.13, 0, 4.5, '#c084fc');
                                e.shootCooldown = Math.max(80, 128 - state.difficulty * 10);
                            }
                            playSound('enemyShoot');
                        }
                    }

                    if (e.y > H + e.r + 40) {
                        enemies.splice(i, 1);
                        continue;
                    }

                    if (player.invincible <= 0 && dist2(e, player) < (e.r + player.hitR) ** 2) {
                        e.hp -= 4;
                        playerHit();
                        if (e.hp <= 0) {
                            destroyEnemy(e);
                            enemies.splice(i, 1);
                        }
                        continue;
                    }

                    for (let j = bullets.length - 1; j >= 0; j--) {
                        const b = bullets[j];
                        if (dist2(b, e) < (b.r + e.r) ** 2) {
                            e.hp -= b.damage;
                            e.flash = 4;
                            burst(b.x, b.y, b.kind === 'laser' ? 3 : 5, [b.color, '#ffffff'], 2.2);
                            if (b.pierce > 0) b.pierce--;
                            else bullets.splice(j, 1);

                            if (e.hp <= 0) {
                                destroyEnemy(e);
                                enemies.splice(i, 1);
                                break;
                            }
                        }
                    }
                }
            }

            function destroyEnemy(e, fromBomb = false) {
                const comboBonus = Math.min(900, state.combo * 35);
                const earned = Math.round(e.score + comboBonus);
                state.score += earned;
                state.combo++;
                state.comboTimer = 120;
                if (state.score > state.best) {
                    state.best = state.score;
                    localStorage.setItem('raiden-html-best', String(state.best));
                }

                playSound('boom');
                const colors = e.type === 'tank' ? ['#ff9f1c', '#ffd166', '#ffffff'] : e.type === 'boss' ? ['#ef476f', '#48e8ff', '#ffd166', '#ffffff'] : ['#ff4d6d', '#ffd166', '#39ff88'];
                burst(e.x, e.y, e.type === 'boss' ? 90 : e.type === 'tank' ? 42 : 24, colors, e.type === 'boss' ? 8.8 : 5.6);
                addShockwave(e.x, e.y, colors[0], e.type === 'boss' ? 120 : 42);
                state.shake = Math.max(state.shake, e.type === 'boss' ? 18 : e.type === 'tank' ? 9 : 5);
                state.hitstop = Math.max(state.hitstop, e.type === 'boss' ? 7 : 2);
                addText(e.x, e.y - 8, '+' + earned, '#ffffff', 36, rand(-0.4, 0.4), -1.2, 14);

                if (!fromBomb) maybeDropPowerup(e.x, e.y, e.type);
                updateHud();
            }

            function maybeDropPowerup(x, y, enemyType) {
                const chance = enemyType === 'boss' ? 1 : enemyType === 'tank' ? 0.62 : 0.28;
                if (Math.random() > chance) return;
                const roll = Math.random();
                const type = enemyType === 'boss' ? 'power' : roll < 0.68 ? 'power' : roll < 0.93 ? 'bomb' : 'life';
                const weapon = type === 'power' ? weaponKeys[(Math.random() * weaponKeys.length) | 0] : null;
                powerups.push({ x, y, r: type === 'life' ? 13 : 11, vy: 1.45, type, weapon, t: 0 });
            }

            function updatePowerups() {
                for (let i = powerups.length - 1; i >= 0; i--) {
                    const p = powerups[i];
                    p.t++;
                    p.y += p.vy;
                    p.x += Math.sin(p.t / 14) * 0.9;
                    if (p.y > H + 30) {
                        powerups.splice(i, 1);
                        continue;
                    }
                    if (dist2(p, player) < (p.r + player.r + 4) ** 2) {
                        if (p.type === 'power') {
                            const pickedWeapon = p.weapon || state.weapon;
                            if (pickedWeapon === state.weapon) {
                                state.power = Math.min(5, state.power + 1);
                                addText(player.x, player.y - 36, state.power === 5 ? 'MAX ' + WEAPONS[state.weapon].label : WEAPONS[state.weapon].label + ' UP', WEAPONS[state.weapon].color, 42, 0, -0.75, 18);
                            } else {
                                state.weapon = pickedWeapon;
                                state.power = Math.max(1, Math.min(5, state.power));
                                addText(player.x, player.y - 36, WEAPONS[state.weapon].label, WEAPONS[state.weapon].color, 42, 0, -0.75, 18);
                            }
                        } else if (p.type === 'bomb') {
                            state.bombs = Math.min(3, state.bombs + 1);
                            addText(player.x, player.y - 36, 'BOMB +1', '#ffd166', 42, 0, -0.75, 18);
                        } else if (p.type === 'life') {
                            state.lives = Math.min(5, state.lives + 1);
                            addText(player.x, player.y - 36, 'EXTRA LIFE', '#ff4d6d', 50, 0, -0.75, 18);
                        }
                        state.score += 50;
                        playSound('power');
                        burst(p.x, p.y, 22, ['#ffffff', p.type === 'bomb' ? '#ffd166' : p.type === 'life' ? '#ff4d6d' : WEAPONS[p.weapon || state.weapon].color], 4.0);
                        powerups.splice(i, 1);
                        updateHud();
                    }
                }
            }

            function playerHit() {
                if (state.mode !== 'playing' || player.invincible > 0) return;
                state.lives--;
                state.power = Math.max(1, state.power - 1);
                state.combo = 0;
                state.comboTimer = 0;
                player.invincible = 125;
                player.flash = 24;
                player.x = W / 2;
                player.y = H - 82;
                state.shake = Math.max(state.shake, 20);
                state.flash = Math.max(state.flash, 0.55);
                state.hitstop = Math.max(state.hitstop, 9);
                burst(player.x, player.y, 64, ['#ff4d6d', '#ffd166', '#ffffff'], 7.5);
                addShockwave(player.x, player.y, '#ff4d6d', 80);
                playSound('boom');

                if (state.lives <= 0) {
                    state.mode = 'gameover';
                    if (state.score > state.best) {
                        state.best = state.score;
                        localStorage.setItem('raiden-html-best', String(state.best));
                    }
                    addText(W / 2, H / 2 + 76, 'PRESS SPACE / CLICK TO RETRY', '#39ff88', 999, 0, 0, 16);
                } else {
                    addText(W / 2, H / 2, 'HIT!', '#ff4d6d', 58, 0, -0.5, 24);
                }
                updateHud();
            }

            function burst(x, y, count, colors, force = 5) {
                const maxParticles = 420;
                for (let i = 0; i < count; i++) {
                    if (particles.length > maxParticles) particles.shift();
                    const angle = Math.random() * TAU;
                    const speed = rand(force * 0.25, force);
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        r: rand(1.2, 4.0),
                        life: rand(18, 48),
                        maxLife: 48,
                        color: colors[(Math.random() * colors.length) | 0],
                        gravity: rand(0.015, 0.07)
                    });
                }
            }

            function addShockwave(x, y, color, maxR) {
                shockwaves.push({ x, y, r: 4, maxR, life: 30, color });
            }

            function addText(x, y, text, color, life, vx, vy, size = 13) {
                floatTexts.push({ x, y, text, color, life, maxLife: life, vx, vy, size });
            }

            function updateFx() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.vx *= 0.985;
                    p.vy *= 0.985;
                    p.life--;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                for (let i = shockwaves.length - 1; i >= 0; i--) {
                    const s = shockwaves[i];
                    s.r += (s.maxR - s.r) * 0.18;
                    s.life--;
                    if (s.life <= 0) shockwaves.splice(i, 1);
                }

                for (let i = floatTexts.length - 1; i >= 0; i--) {
                    const t = floatTexts[i];
                    t.x += t.vx;
                    t.y += t.vy;
                    t.life--;
                    if (t.life <= 0) floatTexts.splice(i, 1);
                }

                state.shake *= 0.86;
                if (state.shake < 0.05) state.shake = 0;
                state.flash *= 0.87;
            }

            function updateGame() {
                if (state.mode !== 'playing') {
                    updateFx();
                    return;
                }

                if (state.hitstop > 0) {
                    state.hitstop--;
                    updateFx();
                    return;
                }

                state.frame++;
                state.difficulty = Math.min(3.25, 1 + state.frame / 2600 + state.score / 30000);

                if (state.comboTimer > 0) state.comboTimer--;
                else state.combo = 0;

                updatePlayer();
                updateBullets();
                updateEnemies();
                updatePowerups();
                updateFx();

                state.waveCooldown--;
                if (state.waveCooldown <= 0) {
                    spawnWave();
                    state.waveCooldown = Math.max(92, Math.floor(185 - state.difficulty * 20 + rand(-10, 18)));
                }

                if (state.frame % 20 === 0) updateHud();
            }

            function drawBackground() {
                const g = ctx.createLinearGradient(0, 0, 0, H);
                g.addColorStop(0, '#020712');
                g.addColorStop(0.48, '#061827');
                g.addColorStop(1, '#01040a');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, W, H);

                // Raiden-like scrolling terrain / runway grid
                const scroll = (state.frame * 1.45) % 96;
                ctx.save();
                ctx.globalAlpha = 0.55;
                for (let y = -96 + scroll; y < H + 96; y += 96) {
                    ctx.fillStyle = y % 192 < 96 ? 'rgba(18, 68, 54, 0.28)' : 'rgba(11, 46, 67, 0.22)';
                    ctx.fillRect(0, y, W, 48);
                    ctx.strokeStyle = 'rgba(57, 255, 136, 0.16)';
                    ctx.beginPath();
                    ctx.moveTo(0, y + 48);
                    ctx.lineTo(W, y + 48);
                    ctx.stroke();
                }

                // Center river/road shape
                ctx.fillStyle = 'rgba(8, 22, 32, 0.72)';
                ctx.beginPath();
                for (let y = -20; y <= H + 40; y += 30) {
                    const wave = Math.sin((y + state.frame * 0.95) / 92) * 32;
                    const half = 44 + Math.sin((y + state.frame) / 140) * 9;
                    const x = W / 2 + wave;
                    if (y === -20) ctx.moveTo(x - half, y);
                    else ctx.lineTo(x - half, y);
                }
                for (let y = H + 40; y >= -20; y -= 30) {
                    const wave = Math.sin((y + state.frame * 1.7) / 92) * 32;
                    const half = 44 + Math.sin((y + state.frame) / 140) * 9;
                    const x = W / 2 + wave;
                    ctx.lineTo(x + half, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                stars.forEach(s => {
                    const y = (s.y + state.frame * (0.75 + s.z * 2.0)) % H;
                    const alpha = 0.25 + Math.sin(state.frame * 0.04 + s.twinkle) * 0.18 + s.z * 0.25;
                    ctx.fillStyle = `rgba(190, 255, 235, ${clamp(alpha, 0.12, 0.92)})`;
                    ctx.fillRect(s.x, y, s.z > 0.8 ? 2 : 1, s.z > 0.8 ? 2 : 1);
                });
            }

            function drawPlayer() {
                if (!player) return;
                player.trail.forEach((t, i) => {
                    ctx.globalAlpha = (t.life / 16) * 0.20;
                    ctx.fillStyle = i % 2 ? WEAPONS[state.weapon].glow : WEAPONS[state.weapon].color;
                    ctx.beginPath();
                    ctx.ellipse(t.x, t.y, 13 + i, 8 + i * 0.4, 0, 0, TAU);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                const blink = player.invincible > 0 && Math.floor(state.frame / 4) % 2 === 0;
                if (blink) ctx.globalAlpha = 0.45;

                const x = player.x;
                const y = player.y;
                ctx.save();
                ctx.translate(x, y);

                const main = player.flash > 0 ? '#ffffff' : '#4cc9f0';
                ctx.fillStyle = 'rgba(72,232,255,0.18)';
                ctx.beginPath();
                ctx.ellipse(0, 1, 26, 35, 0, 0, TAU);
                ctx.fill();

                ctx.fillStyle = '#082f49';
                ctx.beginPath();
                ctx.moveTo(0, -29);
                ctx.lineTo(-18, 18);
                ctx.lineTo(0, 10);
                ctx.lineTo(18, 18);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#93e7ff';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = main;
                ctx.beginPath();
                ctx.moveTo(0, -24);
                ctx.lineTo(-11, 16);
                ctx.lineTo(0, 9);
                ctx.lineTo(11, 16);
                ctx.closePath();
                ctx.fill();

                // Raiden-like wing plating and cockpit highlights.
                ctx.fillStyle = '#1d4ed8';
                ctx.fillRect(-27, 5, 19, 8);
                ctx.fillRect(8, 5, 19, 8);
                ctx.fillStyle = WEAPONS[state.weapon].color;
                ctx.fillRect(-22, 0, 9, 4);
                ctx.fillRect(13, 0, 9, 4);
                ctx.fillStyle = '#dff7ff';
                ctx.fillRect(-5, -15, 10, 13);
                ctx.fillStyle = 'rgba(255,255,255,0.55)';
                ctx.fillRect(-2, -13, 3, 9);

                ctx.fillStyle = state.frame % 6 < 3 ? '#ffd166' : '#ff7b00';
                ctx.fillRect(-9, 19, 5, 13 + (state.frame % 5));
                ctx.fillRect(4, 19, 5, 13 + ((state.frame + 2) % 5));

                if (player.muzzle > 0) {
                    ctx.globalAlpha = player.muzzle / 5;
                    ctx.fillStyle = WEAPONS[state.weapon].glow;
                    ctx.beginPath();
                    ctx.moveTo(0, -40);
                    ctx.lineTo(-8, -22);
                    ctx.lineTo(8, -22);
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                ctx.restore();
                ctx.globalAlpha = 1;

                // Tiny fair hitbox marker.
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.hitR, 0, TAU);
                ctx.fill();

                if (player.invincible > 0) {
                    ctx.strokeStyle = `rgba(72, 232, 255, ${0.35 + Math.sin(state.frame * 0.24) * 0.20})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, 31 + Math.sin(state.frame / 8) * 3, 0, TAU);
                    ctx.stroke();
                }
            }

            function drawEnemies() {
                enemies.forEach(e => {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.type === 'dart' ? Math.sin(e.t / 8) * 0.12 : 0);
                    const c = e.flash > 0 ? '#ffffff' : e.color;
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, e.r * 1.35, e.r * 1.1, 0, 0, TAU);
                    ctx.fill();
                    ctx.fillStyle = c;
                    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
                    ctx.lineWidth = 1.5;

                    if (e.type === 'boss') {
                        ctx.beginPath();
                        ctx.moveTo(0, -42);
                        ctx.lineTo(-54, 8);
                        ctx.lineTo(-34, 34);
                        ctx.lineTo(0, 18);
                        ctx.lineTo(34, 34);
                        ctx.lineTo(54, 8);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#24050d';
                        ctx.fillRect(-24, -12, 48, 16);
                        ctx.fillStyle = '#48e8ff';
                        ctx.fillRect(-14, -8, 28, 8);
                        ctx.fillStyle = '#ffd166';
                        ctx.fillRect(-44, 8, 18, 6);
                        ctx.fillRect(26, 8, 18, 6);
                    } else if (e.type === 'tank') {
                        ctx.fillRect(-24, -15, 48, 30);
                        ctx.strokeRect(-24, -15, 48, 30);
                        ctx.fillStyle = e.flash > 0 ? '#ffffff' : '#7c2d12';
                        ctx.fillRect(-13, -24, 26, 14);
                        ctx.fillRect(-30, 4, 60, 9);
                        ctx.fillStyle = '#ffd166';
                        ctx.fillRect(-18, -6, 36, 4);
                    } else if (e.type === 'turret') {
                        ctx.beginPath();
                        ctx.moveTo(0, -22);
                        ctx.lineTo(-20, 14);
                        ctx.lineTo(0, 23);
                        ctx.lineTo(20, 14);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#312e81';
                        ctx.fillRect(-7, -2, 14, 13);
                        ctx.fillStyle = '#c084fc';
                        ctx.fillRect(-4, -15, 8, 14);
                    } else if (e.type === 'dart') {
                        ctx.beginPath();
                        ctx.moveTo(0, 18);
                        ctx.lineTo(-12, -12);
                        ctx.lineTo(0, -5);
                        ctx.lineTo(12, -12);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#ffd166';
                        ctx.fillRect(-3, 0, 6, 10);
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(0, 19);
                        ctx.lineTo(-18, -10);
                        ctx.lineTo(-5, -2);
                        ctx.lineTo(0, -18);
                        ctx.lineTo(5, -2);
                        ctx.lineTo(18, -10);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#ffd166';
                        ctx.fillRect(-4, -7, 8, 10);
                    }
                    ctx.restore();

                    // HP bar for tougher enemies.
                    if (e.maxHp > 3 && e.y > 0) {
                        const width = e.type === 'boss' ? 120 : 48;
                        ctx.fillStyle = 'rgba(0,0,0,0.55)';
                        ctx.fillRect(e.x - width / 2, e.y - e.r - 13, width, 5);
                        ctx.fillStyle = e.type === 'boss' ? '#ff4d6d' : '#ffd166';
                        ctx.fillRect(e.x - width / 2, e.y - e.r - 13, width * clamp(e.hp / e.maxHp, 0, 1), 5);
                    }
                });
            }

            function drawBullets() {
                ctx.save();
                bullets.forEach(b => {
                    ctx.globalAlpha = 0.22;
                    ctx.fillStyle = b.glow;
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.r * 2.5, b.r * (b.kind === 'laser' ? 7 : 3.2), 0, 0, TAU);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = b.color;
                    if (b.kind === 'laser') {
                        ctx.fillRect(b.x - b.r / 2, b.y - 20, b.r, 40);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(b.x - 1, b.y - 24, 2, 48);
                    } else if (b.kind === 'missile') {
                        const a = Math.atan2(b.vy, b.vx) + Math.PI / 2;
                        ctx.save();
                        ctx.translate(b.x, b.y);
                        ctx.rotate(a);
                        ctx.beginPath();
                        ctx.moveTo(0, -8);
                        ctx.lineTo(-5, 6);
                        ctx.lineTo(0, 3);
                        ctx.lineTo(5, 6);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.beginPath();
                        ctx.ellipse(b.x, b.y, b.r, b.r * 1.9, 0, 0, TAU);
                        ctx.fill();
                    }
                });
                enemyBullets.forEach(b => {
                    ctx.globalAlpha = 0.22;
                    ctx.fillStyle = b.color;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r * 2.15, 0, TAU);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = b.color;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, TAU);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.globalAlpha = 0.45;
                    ctx.beginPath();
                    ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.35, 0, TAU);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });
                ctx.restore();
            }

            function drawPowerups() {
                powerups.forEach(p => {
                    const weapon = p.weapon ? WEAPONS[p.weapon] : null;
                    const color = p.type === 'bomb' ? '#ffd166' : p.type === 'life' ? '#ff4d6d' : weapon.color;
                    const label = p.type === 'bomb' ? 'B' : p.type === 'life' ? '1' : weapon.code;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.t / 18);
                    ctx.globalAlpha = 0.28;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(0, 0, p.r + 10, 0, TAU);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = color;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const rr = i % 2 === 0 ? p.r + 3 : p.r * 0.7;
                        const a = i / 8 * TAU;
                        const x = Math.cos(a) * rr;
                        const y = Math.sin(a) * rr;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.rotate(-p.t / 18);
                    ctx.fillStyle = '#001018';
                    ctx.font = 'bold 14px ui-monospace, monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, 0, 1);
                    ctx.restore();
                });
            }

            function drawFx() {
                particles.forEach(p => {
                    const alpha = clamp(p.life / p.maxLife, 0, 1);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * (0.45 + alpha), 0, TAU);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                shockwaves.forEach(s => {
                    ctx.globalAlpha = clamp(s.life / 30, 0, 1) * 0.7;
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, TAU);
                    ctx.stroke();
                });
                ctx.globalAlpha = 1;

                floatTexts.forEach(t => {
                    const alpha = clamp(t.life / t.maxLife, 0, 1);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = t.color;
                    ctx.shadowColor = t.color;
                    ctx.shadowBlur = 10;
                    ctx.font = `bold ${t.size}px ui-monospace, monospace`;
                    ctx.textAlign = 'center';
                    ctx.fillText(t.text, t.x, t.y);
                });
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            function drawOverlay() {
                ctx.save();
                ctx.textAlign = 'center';
                if (state.mode === 'start') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.54)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.shadowColor = '#39ff88';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#39ff88';
                    ctx.font = '900 54px ui-monospace, monospace';
                    ctx.fillText('RAIDEN', W / 2, H / 2 - 98);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#dfffee';
                    ctx.font = 'bold 18px ui-monospace, monospace';
                    ctx.fillText('SLOWER RAIDEN-LIKE HTML SHOOTER', W / 2, H / 2 - 58);
                    ctx.fillStyle = '#48e8ff';
                    ctx.font = 'bold 16px ui-monospace, monospace';
                    ctx.fillText('SPACE / CLICK / TAP TO START', W / 2, H / 2 + 10);
                    ctx.fillStyle = 'rgba(255,255,255,0.78)';
                    ctx.font = '13px ui-monospace, monospace';
                    ctx.fillText('V/L/H POWERUPS CHANGE WEAPONS　　X/B/SHIFT = BOMB', W / 2, H / 2 + 45);
                    ctx.fillStyle = 'rgba(255,209,102,0.9)';
                    ctx.fillText('TIP: 紅=Vulcan散射　藍=Laser貫通　黃=Homing追蹤', W / 2, H / 2 + 78);
                }

                if (state.mode === 'paused') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.62)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ffd166';
                    ctx.font = '900 40px ui-monospace, monospace';
                    ctx.fillText('PAUSED', W / 2, H / 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 15px ui-monospace, monospace';
                    ctx.fillText('PRESS P TO RESUME', W / 2, H / 2 + 38);
                }

                if (state.mode === 'gameover') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.68)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.shadowColor = '#ff4d6d';
                    ctx.shadowBlur = 18;
                    ctx.fillStyle = '#ff4d6d';
                    ctx.font = '900 48px ui-monospace, monospace';
                    ctx.fillText('GAME OVER', W / 2, H / 2 - 52);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 18px ui-monospace, monospace';
                    ctx.fillText('SCORE ' + String(state.score).padStart(6, '0'), W / 2, H / 2 - 8);
                    ctx.fillText('BEST  ' + String(state.best).padStart(6, '0'), W / 2, H / 2 + 22);
                    ctx.fillStyle = '#39ff88';
                    ctx.font = 'bold 16px ui-monospace, monospace';
                    ctx.fillText('SPACE / CLICK / TAP TO RETRY', W / 2, H / 2 + 72);
                }
                ctx.restore();
            }

            function render() {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, W, H);

                const sx = state.shake ? rand(-state.shake, state.shake) : 0;
                const sy = state.shake ? rand(-state.shake, state.shake) : 0;
                ctx.save();
                ctx.translate(sx, sy);
                drawBackground();
                drawPowerups();
                drawEnemies();
                drawBullets();
                drawPlayer();
                drawFx();
                ctx.restore();

                if (state.combo > 1 && state.comboTimer > 0 && state.mode === 'playing') {
                    ctx.save();
                    ctx.textAlign = 'right';
                    ctx.fillStyle = `rgba(255, 209, 102, ${clamp(state.comboTimer / 80, 0.25, 1)})`;
                    ctx.font = 'bold 16px ui-monospace, monospace';
                    ctx.fillText('COMBO x' + state.combo, W - 18, 34);
                    ctx.restore();
                }

                if (state.flash > 0.02) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${clamp(state.flash, 0, 0.75)})`;
                    ctx.fillRect(0, 0, W, H);
                }
                drawOverlay();
            }

            function frame(ts) {
                if (!lastTs) lastTs = ts;
                const elapsed = Math.min(34, ts - lastTs);
                lastTs = ts;
                // Keep the animation deterministic-ish at common refresh rates.
                const steps = elapsed > 24 ? 2 : 1;
                for (let i = 0; i < steps; i++) updateGame();
                render();
                requestAnimationFrame(frame);
            }

            function boot() {
                player = makePlayer();
                updateHud();
                if (!loopStarted) {
                    loopStarted = true;
                    requestAnimationFrame(frame);
                }
            }

            // Expose a tiny debug API for browser console / automated verification.
            const debugState = () => ({
                mode: state.mode,
                frame: state.frame,
                score: state.score,
                lives: state.lives,
                power: state.power,
                weapon: state.weapon,
                bombs: state.bombs,
                difficulty: Number(state.difficulty.toFixed(2)),
                waveCooldown: state.waveCooldown,
                enemies: enemies.length,
                bullets: bullets.length,
                enemyBullets: enemyBullets.length,
                particles: particles.length
            });

            window.raidenGame = {
                start: resetGame,
                bomb: useBomb,
                setWeapon: (weapon, power = state.power) => {
                    if (WEAPONS[weapon]) {
                        state.weapon = weapon;
                        state.power = clamp(Math.round(power), 1, 5);
                        updateHud();
                    }
                    return debugState();
                },
                getState: debugState
            };

            boot();
        })();
    </script>
</body>
</html>
