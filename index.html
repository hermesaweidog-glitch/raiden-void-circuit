<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <meta name="description" content="Raiden: Void Circuit — playable roguelite vertical shooter">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
  <title>RAIDEN: VOID CIRCUIT</title>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><strong>RAIDEN</strong><span>VOID CIRCUIT</span></div>
      <div class="status-actions">
        <button id="mute-button" class="icon-button" aria-label="切換聲音">SOUND</button>
        <button id="pause-button" class="icon-button" aria-label="暫停遊戲">PAUSE</button>
      </div>
    </header>

    <section class="hud" aria-label="遊戲狀態">
      <div><small>SCORE</small><b id="score">0000000</b></div>
      <div><small>SECTOR</small><b id="stage">—</b></div>
      <div><small>LEVEL</small><b id="level">01</b></div>
      <div><small>HP</small><b id="hp">●●●●</b></div>
      <div><small>BOMB</small><b id="bombs">◆◆</b></div>
    </section>
    <section id="route-progress" class="route-progress" aria-label="戰區進度">
      <div class="route-meta"><span id="route-label">AWAITING DEPLOYMENT</span><b id="route-status">STANDBY</b></div>
      <div class="route-track">
        <div id="route-fill"></div>
        <span id="midboss-node" class="route-node midboss-node" title="中頭目檢查點" aria-label="中頭目檢查點"></span>
        <span id="boss-node" class="route-node boss-node" title="戰區頭目" aria-label="戰區頭目"></span>
      </div>
    </section>
    <div class="xp-track" aria-label="升級經驗"><div id="xp-bar"></div></div>

    <section class="game-frame">
      <canvas id="game" width="480" height="800" aria-label="Raiden roguelite shooting game"></canvas>

      <section id="title-overlay" class="overlay title-overlay">
        <div class="title-lockup">
          <p class="eyebrow">TACTICAL ROGUELITE STRIKE</p>
          <h1>VOID<br><span>CIRCUIT</span></h1>
          <p>五個戰區、三架戰機、動態 Build 與多階段頭目</p>
        </div>
        <div id="aircraft-select" class="aircraft-grid" aria-label="選擇戰機"></div>
        <p class="start-help">桌面：WASD / 方向鍵移動，Space 射擊，X/B/Shift 炸彈<br>手機：拖曳移動、自動射擊，右下 BOMB</p>
      </section>

      <section id="upgrade-overlay" class="overlay upgrade-overlay hidden" aria-live="polite">
        <div class="upgrade-heading"><small id="upgrade-kicker">LEVEL UP</small><h2 id="upgrade-title">選擇一項強化</h2></div>
        <div id="upgrade-options" class="upgrade-options"></div>
      </section>

      <section id="end-overlay" class="overlay end-overlay hidden">
        <p id="end-kicker">RUN TERMINATED</p>
        <h2 id="end-title">MISSION FAILED</h2>
        <div id="run-summary" class="run-summary"></div>
        <button id="retry-button" class="primary-button">重新出擊</button>
      </section>

      <div id="announcement" class="announcement hidden"></div>
      <button id="bomb-button" class="bomb-button hidden" aria-label="使用炸彈">BOMB<span id="bomb-count">2</span></button>
    </section>

    <footer class="build-strip">
      <div><small>PRIMARY</small><span id="primary-build">—</span></div>
      <div><small>SECONDARY</small><span id="secondary-build">—</span></div>
      <div><small>PASSIVE</small><span id="passive-build">—</span></div>
    </footer>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
